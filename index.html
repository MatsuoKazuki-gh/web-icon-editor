<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Icon Prep Tool</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Icon Prep Tool</h1>
    <p class="subtitle">主要なサイズ向けのシンプルなアイコン作成ツール</p>
  </header>

  <main class="layout">
    <section class="controls" aria-label="操作パネル">
      <div class="control-group">
        <label for="fileInput">画像をアップロード</label>
        <input type="file" id="fileInput" accept="image/png, image/jpeg">
      </div>

      <div class="control-group">
        <label for="presetSelect">プリセットサイズ</label>
        <select id="presetSelect">
          <option value="size512">512 x 512 (Large)</option>
          <option value="size256">256 x 256 (Small)</option>
          <option value="size400">400 x 400 (Medium)</option>
          <option value="custom">Custom</option>
        </select>
        <div id="customSizeFields" class="custom-size" aria-live="polite">
          <label class="inline" for="customWidth">幅</label>
          <input type="number" id="customWidth" min="1" value="512">
          <label class="inline" for="customHeight">高さ</label>
          <input type="number" id="customHeight" min="1" value="512">
        </div>
      </div>

      <div class="control-group">
        <label class="inline" for="transparentToggle">
          <input type="checkbox" id="transparentToggle" checked>
          透過背景 (PNG)
        </label>
        <div id="bgColorWrapper" class="color-picker">
          <label for="bgColor">背景色</label>
          <input type="color" id="bgColor" value="#ffffff">
        </div>
      </div>

      <div class="control-group">
        <label class="inline" for="gridToggle">
          <input type="checkbox" id="gridToggle" checked>
          グリッド線を表示
        </label>
        <p class="hint">キャンバス上でドラッグすると切り取り範囲を指定でき、選択後は端のマークをドラッグして微調整できます。</p>
      </div>

      <div class="buttons">
        <button id="downloadButton" type="button">PNGとしてダウンロード</button>
        <button id="resetCropButton" type="button">切り取りをリセット</button>
      </div>
    </section>

    <section class="preview" aria-label="プレビュー">
      <canvas id="previewCanvas" width="512" height="512"></canvas>
      <p id="sizeLabel" class="size-label" aria-live="polite">Size: 512 x 512</p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
